<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #1a1a2e; color: #a0a0b0;
      text-align: center;
    }
    .msg { font-size: 1.1rem; }
    a { color: #e94560; }
  </style>

  <!-- Client-side redirect to the SmartScreen phishing demo page -->
  <meta http-equiv="refresh" content="2;url=https://nav.smartscreen.msft.net/phishingdemo.html">
</head>
<body>
  <div class="msg">
    <p>Redirecting to SmartScreen phishing demo&hellip;</p>

      If you are not redirected automatically,
      <a href="https://nav.smartscreen.msft.net/phishingdemo.html">click here</a>.
    </p>
  </div>

  <script>
    // JS redirect as a fallback (fires immediately after a short delay)
    setTimeout(function () {
      window.location.href = 'https://nav.smartscreen.msft.net/phishingdemo.html';
    }, 2000);
  </script>
</body>
</html>
